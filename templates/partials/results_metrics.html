<section class="metric-grid" aria-label="Ringkasan hasil kompresi">
  <article class="metric-card">
    <span><i data-lucide="clock"></i></span>
    <div>
      <small>Waktu Eksekusi</small>
      <strong data-runtime>0.00 s</strong>
      <p>Runtime algoritma</p>
    </div>
  </article>
  <article class="metric-card">
    <span><i data-lucide="scan-line"></i></span>
    <div>
      <small>Rasio Kompresi</small>
      <strong data-compression-ratio>0.00 : 1</strong>
      <p>Lebih kecil lebih baik</p>
    </div>
  </article>
  <article class="metric-card wide">
    <span><i data-lucide="file-text"></i></span>
    <div>
      <small>Ukuran File</small>
      <strong><b data-original-size>0 B</b><i data-lucide="arrow-right"></i><b data-compressed-size>0 B</b></strong>
      <p><em>Asli</em><em>Terkompresi</em></p>
    </div>
  </article>
  <article class="metric-card">
    <span><i data-lucide="download"></i></span>
    <div>
      <small>Reduksi Data PCA</small>
      <strong data-compression-percentage>0.0%</strong>
      <p></p>
    </div>
  </article>
</section>
